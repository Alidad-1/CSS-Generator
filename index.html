<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- Preview Section -->
    <section class="preview">
        <div class="object" id="ObjectPrview">
            OBJECT
        </div>
    </section>


    <!-- Generators -->
    <section class="generators">

        <!-- Box Shadow -->
        <div class="generator">
            <h2>Box Shadow</h2>

            <div class="controls">

                <div class="control">
                    <label>Horizontal</label>
                    <input type="range" min="-50" max="50" id="box_shadow_horizontal">
                </div>

                <div class="control">
                    <label>Vertical</label>
                    <input type="range" min="-50" max="50" id="box_shadow_vertical">
                </div>

                <div class="control">
                    <label>Blur</label>
                    <input type="range" min="0" max="50" id="box_shadow_blur">
                </div>

                <div class="control">
                    <label>Spread</label>
                    <input type="range" min="0" max="50" value="2" id="box_shadow_spread">
                </div>

                <div class="control">
                    <label>Color</label>
                    <input type="color" id="box_shadow_color">
                </div>

                <div class="copy">
                    <textarea  id="Box_shadow_code" readonly></textarea>
                    <button id="copy_Btn">Copy</button>
                </div>

            </div>
        </div>


        <!-- Text Shadow -->
        <div class="generator">
            <h2>Text Shadow</h2>

            <div class="controls">

                <div class="control">
                    <label>Horizontal</label>
                    <input type="range" min="-50" max="50">
                </div>

                <div class="control">
                    <label>Vertical</label>
                    <input type="range" min="-50" max="50">
                </div>

                <div class="control">
                    <label>Blur</label>
                    <input type="range" min="0" max="50">
                </div>

                <div class="control">
                    <label>Color</label>
                    <input type="color">
                </div>

                <div class="copy">
                    <textarea readonly></textarea>
                    <button>Copy</button>
                </div>

            </div>
        </div>


        <!-- Border Radius -->
        <div class="generator">
            <h2>Border Radius</h2>

            <div class="controls">

                <div class="control">
                    <label>Top Left</label>
                    <input type="range" min="0" max="100">
                </div>

                <div class="control">
                    <label>Top Right</label>
                    <input type="range" min="0" max="100">
                </div>

                <div class="control">
                    <label>Bottom Left</label>
                    <input type="range" min="0" max="100">
                </div>

                <div class="control">
                    <label>Bottom Right</label>
                    <input type="range" min="0" max="100">
                </div>

                <div class="copy">
                    <textarea readonly></textarea>
                    <button>Copy</button>
                </div>

            </div>
        </div>


        <!-- Gradient -->
        <div class="generator">
            <h2>Gradient</h2>

            <div class="controls">

                <div class="control">
                    <label>Color 1</label>
                    <input type="color">
                </div>

                <div class="control">
                    <label>Color 2</label>
                    <input type="color">
                </div>

                <div class="control">
                    <label>Angle</label>
                    <input type="range" min="0" max="360">
                </div>

                <div class="copy">
                    <textarea readonly></textarea>
                    <button>Copy</button>
                </div>

            </div>
        </div>
<div class="generator">

<h2>Transform</h2>

<div class="controls">

<div class="control">
<label>Rotate</label>
<input type="range" min="-180" max="180">
</div>

<div class="control">
<label>Scale</label>
<input type="range" min="0" max="3" step="0.1">
</div>

<div class="control">
<label>Translate X</label>
<input type="range" min="-200" max="200">
</div>

<div class="control">
<label>Translate Y</label>
<input type="range" min="-200" max="200">
</div>

<div class="control">
<label>Skew X</label>
<input type="range" min="-90" max="90">
</div>

<div class="control">
<label>Skew Y</label>
<input type="range" min="-90" max="90">
</div>

<div class="copy">
<textarea readonly></textarea>
<button>Copy</button>
</div>

</div>

</div>
<div class="generator">

<h2>Filter</h2>

<div class="controls">

<div class="control">
<label>Blur</label>
<input type="range" min="0" max="20">
</div>

<div class="control">
<label>Brightness</label>
<input type="range" min="0" max="200">
</div>

<div class="control">
<label>Contrast</label>
<input type="range" min="0" max="200">
</div>

<div class="control">
<label>Saturate</label>
<input type="range" min="0" max="200">
</div>

<div class="control">
<label>Grayscale</label>
<input type="range" min="0" max="100">
</div>

<div class="control">
<label>Sepia</label>
<input type="range" min="0" max="100">
</div>

<div class="copy">
<textarea readonly></textarea>
<button>Copy</button>
</div>

</div>

</div>
<div class="generator">

<h2>Opacity</h2>

<div class="controls">

<div class="control">
<label>Opacity</label>
<input type="range" min="0" max="1" step="0.01">
</div>

<div class="copy">
<textarea readonly></textarea>
<button>Copy</button>
</div>

</div>

</div>
<div class="generator">

<h2>Letter Spacing</h2>

<div class="controls">

<div class="control">
<label>Spacing</label>
<input type="range" min="-10" max="20">
</div>

<div class="copy">
<textarea readonly></textarea>
<button>Copy</button>
</div>

</div>

</div>
<div class="generator">

<h2>Backdrop Filter</h2>

<div class="controls">

<div class="control">
<label>Blur</label>
<input type="range" min="0" max="20">
</div>

<div class="control">
<label>Brightness</label>
<input type="range" min="0" max="200">
</div>

<div class="control">
<label>Contrast</label>
<input type="range" min="0" max="200">
</div>

<div class="copy">
<textarea readonly></textarea>
<button>Copy</button>
</div>

</div>

</div>
<div class="generator">

<h2>Clip Path</h2>

<div class="controls">

<div class="control">
<label>Top</label>
<input type="range" min="0" max="100">
</div>

<div class="control">
<label>Right</label>
<input type="range" min="0" max="100">
</div>

<div class="control">
<label>Bottom</label>
<input type="range" min="0" max="100">
</div>

<div class="control">
<label>Left</label>
<input type="range" min="0" max="100">
</div>

<div class="copy">
<textarea readonly></textarea>
<button>Copy</button>
</div>

</div>

</div>

<div class="generator">

<h2>Flexbox</h2>

<div class="controls">

<div class="control">
<label>Direction</label>
<select>
<option>row</option>
<option>column</option>
</select>
</div>

<div class="control">
<label>Justify</label>
<select>
<option>flex-start</option>
<option>center</option>
<option>space-between</option>
<option>space-around</option>
</select>
</div>

<div class="control">
<label>Align</label>
<select>
<option>stretch</option>
<option>center</option>
<option>flex-start</option>
<option>flex-end</option>
</select>
</div>

<div class="copy">
<textarea readonly></textarea>
<button>Copy</button>
</div>

</div>

</div>

<div class="generator">

<h2>Grid</h2>

<div class="controls">

<div class="control">
<label>Columns</label>
<input type="range" min="1" max="12">
</div>

<div class="control">
<label>Rows</label>
<input type="range" min="1" max="12">
</div>

<div class="control">
<label>Gap</label>
<input type="range" min="0" max="50">
</div>

<div class="copy">
<textarea readonly></textarea>
<button>Copy</button>
</div>

</div>

</div>
<div class="generator">

<h2>Transition</h2>

<div class="controls">

<div class="control">
<label>Duration</label>
<input type="range" min="0" max="5" step="0.1">
</div>

<div class="control">
<label>Delay</label>
<input type="range" min="0" max="5" step="0.1">
</div>

<div class="control">
<label>Property</label>
<select>
<option>all</option>
<option>transform</option>
<option>opacity</option>
<option>background</option>
</select>
</div>

<div class="copy">
<textarea readonly></textarea>
<button>Copy</button>
</div>

</div>

</div>

<div class="generator">

<h2>Animation</h2>

<div class="controls">

<div class="control">
<label>Duration</label>
<input type="range" min="0" max="10">
</div>

<div class="control">
<label>Delay</label>
<input type="range" min="0" max="10">
</div>

<div class="control">
<label>Iteration</label>
<input type="range" min="1" max="10">
</div>

<div class="copy">
<textarea readonly></textarea>
<button>Copy</button>
</div>

</div>

</div>

    </section>

</div>

<script src="app.js"></script>
</body>
</html>
